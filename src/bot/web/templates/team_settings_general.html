{% extends "team_settings_base.html" %}
{% block title %}Allgemein — {{ team_id }}{% endblock %}
{% block team_settings_content %}
<h1 class="text-2xl font-bold mb-2">Allgemein</h1>
{% if request.query_params.get('saved') %}
<p class="p-status-ok mb-4">Gespeichert.</p>
{% endif %}
{% if error %}
<p class="p-status-bad mb-4 text-sm">{{ error }}</p>
{% endif %}
<form method="post" action="/teams/{{ team_id }}/settings/general" class="p-card p-5 space-y-4 max-w-xl">
  <div>
    <label class="block text-sm p-muted mb-1">Anzeigename</label>
    <input name="name" required class="w-full p-input" value="{{ team.name }}">
  </div>
  <div>
    <label class="block text-sm p-muted mb-1">Preset</label>
    <select name="preset" class="w-full p-input">
      {% for p in ['generic', 'demo', 'coding', 'story'] %}
      <option value="{{ p }}" {% if team.preset == p %}selected{% endif %}>{{ p }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm p-muted mb-1">Orchestrator-Agent</label>
    <select name="orchestrator_id" class="w-full p-input">
      {% for aid in agent_ids %}
      <option value="{{ aid }}" {% if team.orchestrator_id == aid %}selected{% endif %}>{{ aid }}</option>
      {% endfor %}
    </select>
  </div>
  <label class="flex items-center gap-2 text-sm">
    <input type="checkbox" name="enabled" value="on" {% if team.enabled %}checked{% endif %}> Team aktiv
  </label>
  <button type="submit" class="px-4 py-2 rounded bg-[var(--p-accent)] text-white text-sm">Speichern</button>
</form>
{% endblock %}
