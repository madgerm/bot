{% extends "base.html" %}
{% block title %}Agents — {{ team_id }}{% endblock %}
{% block content %}
<a href="/teams/{{ team_id }}" class="text-sm text-indigo-400">← Team</a>
<h1 class="text-2xl font-bold mt-4 mb-6">Agent Manager</h1>
<form method="post" action="/teams/{{ team_id }}/agents/create" class="mb-6 flex gap-2 flex-wrap">
  <input name="agent_id" required placeholder="agent-id" class="bg-slate-800 border border-slate-700 rounded px-3 py-2">
  <select name="role" class="bg-slate-800 border border-slate-700 rounded px-3 py-2">
    <option value="worker">worker</option>
    <option value="reviewer">reviewer</option>
    <option value="orchestrator">orchestrator</option>
    <option value="story_writer">story_writer</option>
    <option value="coder">coder</option>
  </select>
  <button type="submit" class="bg-indigo-600 px-4 py-2 rounded">Agent anlegen</button>
</form>
<ul class="space-y-2">
  {% for a in agents %}
  <li class="flex justify-between items-center p-4 bg-slate-900 border border-slate-800 rounded">
    <div><span class="font-medium">{{ a.id }}</span> <span class="text-xs text-slate-500">{{ a.role }}</span></div>
    <form method="post" action="/teams/{{ team_id }}/agents/{{ a.id }}/delete" onsubmit="return confirm('Löschen?')">
      <button type="submit" class="text-red-400 text-sm">Löschen</button>
    </form>
  </li>
  {% endfor %}
</ul>
<p class="text-xs text-slate-500 mt-4">Nach Änderungen: <code>bot config validate</code> und Runner neu laden.</p>
{% endblock %}
