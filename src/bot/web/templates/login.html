{% extends "base.html" %}
{% block title %}Anmelden — Bot Panel{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
  <h1 class="text-2xl font-bold mb-6">Anmelden</h1>
  {% if error %}
  <div class="mb-4 p-3 rounded p-alert-error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login" class="space-y-4 p-card p-6">
    <div>
      <label class="p-label" for="username">Benutzer</label>
      <input id="username" name="username" type="text" required
        class="p-input">
    </div>
    <div>
      <label class="p-label" for="password">Passwort</label>
      <input id="password" name="password" type="password" required
        class="p-input">
    </div>
    <button type="submit" class="p-btn p-btn-primary w-full py-2">Einloggen</button>
  </form>
  <p class="mt-4 text-xs p-faint">Demo: admin/changeme oder demo/changeme</p>
</div>
{% endblock %}
