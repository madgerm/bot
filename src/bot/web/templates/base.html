<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bot Panel{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/dashboard" class="font-semibold text-lg tracking-tight">bot panel</a>
      <div class="flex items-center gap-4 text-sm text-slate-300">
        {% if user %}
        <span>{{ user.username }} ({{ user.role }})</span>
        {% if user.role == 'admin' %}
        <a href="/admin" class="hover:text-white">Admin</a>
        {% endif %}
        <form method="post" action="/logout">
          <button type="submit" class="text-red-400 hover:text-red-300">Abmelden</button>
        </form>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
