{% extends "team_layout.html" %}
{% block title %}Git — {{ team_id }}{% endblock %}
{% block team_content %}
<header class="p-page-header mb-6">
  <h1 class="text-2xl font-bold">Git</h1>
</header>
{% if git_error %}<p class="p-status-warn text-sm">{{ git_error }}</p>{% endif %}
<pre class="p-pre overflow-x-auto mb-4">{{ status }}</pre>
<form method="post" action="/teams/{{ team_id }}/git/commit" class="mb-6 flex gap-2">
  <input name="message" required placeholder="Commit-Nachricht" class="flex-1 p-input">
  <button type="submit" class="bg-indigo-600 px-4 py-2 rounded">Commit</button>
</form>
<h2 class="text-sm p-faint uppercase mb-2">Log</h2>
<pre class="p-pre">{{ log }}</pre>
{% endblock %}
