{% extends "settings_base.html" %}
{% block title %}Status — Einstellungen{% endblock %}
{% block settings_content %}
<h1 class="text-2xl font-bold mb-2">Status & Verbindungstests</h1>
<p class="text-sm p-muted mb-4">
  <a href="/admin/settings/hosts" class="p-link">Hosts bearbeiten</a> —
  Tests per HTMX ohne kompletten Seiten-Reload.
</p>

<div class="flex flex-wrap gap-3 mb-6">
  <button type="button" class="px-3 py-1.5 rounded text-sm bg-[var(--p-accent)] text-white"
    hx-get="/admin/settings/status/fragment"
    hx-target="#status-live"
    hx-swap="innerHTML"
    hx-indicator="#status-live-loading">
    Alle Tests neu laden
  </button>
  <button type="button" class="px-3 py-1.5 rounded text-sm p-card border border-[var(--p-border)]"
    hx-get="/admin/settings/status/fragment?live_llm=1"
    hx-target="#status-live"
    hx-swap="innerHTML"
    hx-indicator="#status-live-loading">
    Alle Tests + LLM Live-Prompt
  </button>
</div>

<div id="status-live"
  hx-get="/admin/settings/status/fragment"
  hx-trigger="load"
  hx-swap="innerHTML"
  hx-indicator="#status-live-loading">
  <p id="status-live-loading" class="htmx-indicator text-sm p-muted">Verbindungstests werden ausgeführt …</p>
  <p class="text-sm p-faint">Einen Moment …</p>
</div>
{% endblock %}
