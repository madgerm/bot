name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install venv support
        run: sudo apt-get update && sudo apt-get install -y python3-venv
      - name: Install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -e ".[dev]"
      - name: Validate config (skeleton)
        run: |
          . .venv/bin/activate
          bot config validate || true
      - name: Pytest
        run: |
          . .venv/bin/activate
          pytest -q
