name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install venv support
        run: sudo apt-get update && sudo apt-get install -y python3-venv
      - name: Install from lockfile
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -r requirements-lock.txt
          pip install -e . --no-deps
      - name: Config validate (smoke)
        run: |
          . .venv/bin/activate
          bot config validate
      - name: Pytest
        run: |
          . .venv/bin/activate
          pytest -q

  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify requirements-lock.txt is current
        run: |
          pip install pip-tools
          pip-compile pyproject.toml --extra dev -o requirements-lock.txt --quiet
          git diff --exit-code requirements-lock.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff
        run: |
          pip install ruff
          ruff check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Mypy
        run: |
          pip install -r requirements-lock.txt
          pip install -e . --no-deps
          mypy src/bot --config-file pyproject.toml
